version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: test-synaptiq-platform:latest
    container_name: test_synaptiq_platform_app
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
    restart: unless-stopped
    networks:
      - test_synaptiq_platform_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

